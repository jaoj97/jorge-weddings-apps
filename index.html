<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jorge Weddings — Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    h1 span { color: #c9a96e; }
    p { color: #888; margin-bottom: 2rem; font-size: 1.1rem; }
    .apps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; max-width: 800px; margin: 0 auto; }
    .app-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; text-decoration: none; color: #fff; transition: border-color 0.2s, transform 0.2s; }
    .app-card:hover { border-color: #c9a96e; transform: translateY(-2px); }
    .app-card h2 { font-size: 1rem; margin-bottom: 0.5rem; }
    .app-card p { font-size: 0.85rem; color: #666; margin: 0; }
    footer { margin-top: 3rem; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Jorge <span>Weddings</span></h1>
    <p>Portal de aplicaciones web</p>
    <div class="apps-grid">
      <a class="app-card" href="/post-templates/">
        <h2>Templates de diseño</h2>
        <p>Plantillas para posts e historias</p>
      </a>
      <a class="app-card" href="/grid-planner/">
        <h2>Grid Planner</h2>
        <p>Planea tu grid de Instagram con preview iPhone</p>
      </a>
    </div>
    <footer>apps.jorgeweddings.com</footer>
  </div>
</body>
</html>
